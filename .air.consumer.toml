root = "."
tmp_dir = "tmp_consumer"

[build]
  cmd = "go mod download && go build -buildvcs=false -o ./tmp_consumer/consumer ./cmd/consumer"
  entrypoint = "./tmp_consumer/consumer"
  include_ext = ["go"]
  exclude_dir = ["tmp", "tmp_consumer", "tmp_outbox", "tmp_webhook", "tmp_notification", "vendor"]
  delay = 500
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
