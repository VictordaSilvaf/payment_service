root = "."
tmp_dir = "tmp_notification"

[build]
  cmd = "go mod download && go build -buildvcs=false -o ./tmp_notification/notification ./cmd/notification"
  entrypoint = "./tmp_notification/notification"
  include_ext = ["go"]
  exclude_dir = ["tmp", "tmp_consumer", "tmp_outbox", "tmp_webhook", "tmp_notification", "tmp_audit", "vendor"]
  delay = 500
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
