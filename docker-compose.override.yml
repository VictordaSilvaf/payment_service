# Carregado automaticamente em `docker compose up` para desenvolvimento local.
# Hot-reload: alterações em .go reiniciam a API sem rebuild da imagem.
# Produção: docker compose -f docker-compose.yml up --build
services:
  api:
    build:
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - go_mod_cache:/go/pkg/mod
    restart: "no"

  consumer:
    build:
      dockerfile: Dockerfile.dev
    command: ["sh", "-c", "go mod download && air -c .air.consumer.toml"]
    volumes:
      - .:/app
      - go_mod_cache:/go/pkg/mod
    restart: "no"

  outbox:
    build:
      dockerfile: Dockerfile.dev
    command: ["sh", "-c", "go mod download && air -c .air.outbox.toml"]
    volumes:
      - .:/app
      - go_mod_cache:/go/pkg/mod
    restart: "no"

  webhook:
    build:
      dockerfile: Dockerfile.dev
    command: ["sh", "-c", "go mod download && air -c .air.webhook.toml"]
    volumes:
      - .:/app
      - go_mod_cache:/go/pkg/mod
    restart: "no"

volumes:
  go_mod_cache:
